<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 340px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      background: #1a1a2e;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .logo {
      font-size: 20px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 1px;
    }

    .body {
      padding: 16px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      color: #333;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #4f46e5;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }

    button#scanBtn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#scanBtn:hover { background: #4338ca; }
    button#scanBtn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #result {
      margin-top: 14px;
      display: none;
    }

    .verdict-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .badge-phishing  { background: #fee2e2; color: #b91c1c; }
    .badge-legitimate { background: #dcfce7; color: #15803d; }
    .badge-unknown   { background: #f3f4f6; color: #6b7280; }

    .risk-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .risk-label {
      font-size: 12px;
      color: #555;
      min-width: 60px;
    }

    .risk-bar-wrap {
      flex: 1;
      background: #f0f0f0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .risk-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }

    .risk-high   .risk-bar { background: #ef4444; }
    .risk-medium .risk-bar { background: #f59e0b; }
    .risk-low    .risk-bar { background: #22c55e; }

    .explanation {
      background: #f9fafb;
      border-left: 3px solid #4f46e5;
      border-radius: 0 6px 6px 0;
      padding: 10px 12px;
      font-size: 12px;
      color: #374151;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .signals-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .signals {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .signal-tag {
      background: #ede9fe;
      color: #5b21b6;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
    }

    .loading {
      text-align: center;
      padding: 16px 0;
      font-size: 13px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <span class="logo">🛡️</span>
  <div>
    <h1>Jester</h1>
    <p>AI-powered phishing detector</p>
  </div>
</div>

<div class="body">
  <textarea id="emailInput" placeholder="Paste email content here (headers + body)..."></textarea>
  <p class="hint">On Gmail, press Ctrl+A inside the email and paste here.</p>
  <button id="scanBtn">Scan Email</button>

  <div id="result"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
